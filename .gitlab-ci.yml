# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
stages:
- update
- secret-detection
variables:
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection
include:
- template: Security/Secret-Detection.gitlab-ci.yml
- component: $CI_SERVER_FQDN/fis-asp/intern/technical-services/team-8/gitlab/asp8-ci-cd-templates/template-branch-sync@v1.0.6
  inputs:
    remote-path: "fis-asp/intern/technical-services/team-8/hypervisor/suse-virtualization/vsphere-2-harvester.git"
    prune-missing-enable: true
    disable: true   # disables the default job, required if multiple runner execute this job
    repo-base: "/root/vsphere-2-harvester
    chown-enable: false

secret_gate:
  stage: secret-detection
  needs:
    - job: secret_detection
      artifacts: true
  image: alpine:3.19
  allow_failure: false
  script:
    - |
      apk add --no-cache jq

      if [ ! -f gl-secret-detection-report.json ]; then
        echo "no secret report found"
        exit 1
      fi

      total="$(jq '.vulnerabilities | length' gl-secret-detection-report.json || echo 0)"
      echo "detected secrets total: $total"

      if [ "$total" -gt 0 ]; then
        echo "summary by file:"
        jq -r '
          .vulnerabilities
          | group_by(.location.file)
          | .[]
          | "\(.|length) findings in \((.[0].location.file // "unknown"))"
        ' gl-secret-detection-report.json

        echo "details:"
        jq -r '
          .vulnerabilities[]
          | [
              (.location.file // "unknown"),
              (.location.start_line // .location.line // "n/a"),
              (.name // "secret")
            ] | @tsv
        ' gl-secret-detection-report.json \
        | while IFS=$'\t' read -r file line name; do
            echo "- $file:$line - $name"
          done

        echo "failing due to detected secrets"
        exit 1
      fi

sync_host1:
  extends: .branch_sync_template
  tags: ["asp-svp-mgmt.asp.aspint.de"]